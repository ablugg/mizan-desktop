name: Build Windows

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download Ollama (Windows — full zip with llama-server.exe)
        run: npx tsx scripts/download-ollama.ts

      - name: Build
        run: npm run electron:build -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/Mizan.Setup.*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
