# Mizan Bridge — nginx TLS terminator
# Placed at: /etc/nginx/sites-available/mizan-bridge
# Symlink:   ln -s /etc/nginx/sites-available/mizan-bridge /etc/nginx/sites-enabled/
#
# Prerequisite: obtain a TLS cert for your domain, e.g.:
#   sudo certbot --nginx -d bridge.YOUR_DOMAIN.com
#
# The bridge process (bridge/server.py) listens on 127.0.0.1:3001 only.
# nginx handles all public TLS traffic and proxies to it.

server {
    listen 443 ssl http2;
    server_name bridge.YOUR_DOMAIN.com;   # <-- replace with your domain

    ssl_certificate     /etc/letsencrypt/live/bridge.YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bridge.YOUR_DOMAIN.com/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Never log request/response bodies — they contain user messages
    access_log off;
    error_log /var/log/nginx/mizan-bridge-error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Forward auth token through to bridge
        proxy_set_header X-Bridge-Token $http_x_bridge_token;
        proxy_set_header Content-Type $content_type;

        # Disable nginx request/response buffering so errors surface quickly
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name bridge.YOUR_DOMAIN.com;
    return 301 https://$host$request_uri;
}
