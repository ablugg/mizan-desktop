appId: com.mizan.app
productName: Mizan
copyright: "Copyright 2025 Mizan"

directories:
  output: dist-electron
  buildResources: build

asar: false

files:
  - "electron/dist/**/*"
  - ".next/standalone/**/*"
  - ".next/static/**/*"
  - "public/**/*"
  - "prisma/**/*"
  - "node_modules/.prisma/**/*"
  - "node_modules/@prisma/client/**/*"
  - "node_modules/prisma/**/*"
  - "node_modules/@prisma/migrate/**/*"
  - "node_modules/@prisma/engines/**/*"

extraResources:
  - from: "build/icon.png"
    to: "icon.png"
  - from: "resources/seed.db"
    to: "seed.db"
  - from: ".env"
    to: ".env"
  - from: "data/vector-store/"
    to: "vector-store/"
    filter: "**/*"

afterPack: "scripts/after-pack.js"

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  extraResources:
    - from: "resources/ollama/mac/"
      to: "ollama/mac/"
      filter: "**/*"

win:
  icon: build/icon.ico
  artifactName: "${productName}.Setup.${version}.exe"
  target:
    - target: nsis
      arch:
        - x64
  publisherName: Mizan
  extraResources:
    - from: "resources/ollama/win/"
      to: "ollama/win/"
      filter: "**/*"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64

publish: null
