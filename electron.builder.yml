appId: com.mizan.app
productName: Mizan
copyright: "Copyright 2025 Mizan"

directories:
  output: dist-electron
  buildResources: build

asar: false

files:
  - "electron/dist/**/*"
  - ".next/standalone/**/*"
  - ".next/static/**/*"
  - "public/**/*"
  - "prisma/**/*"
  - "node_modules/.prisma/**/*"
  - "node_modules/@prisma/client/**/*"
  - "node_modules/prisma/**/*"
  - "node_modules/@prisma/migrate/**/*"
  - "node_modules/@prisma/engines/**/*"
  - "node_modules/@anthropic-ai/**/*"

extraResources:
  - from: "build/icon.png"
    to: "icon.png"
  - from: "resources/seed.db"
    to: "seed.db"
  - from: ".env"
    to: ".env"
  - from: "resources/ollama/"
    to: "ollama/"
    filter: "**/*"
  - from: "data/vector-store/"
    to: "vector-store/"
    filter: "**/*"

afterPack: "scripts/after-pack.js"

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  publisherName: Mizan

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish: null
